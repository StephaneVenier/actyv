<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Programme CAP débutant – Test V0 corrigé</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #1f2937;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #22c55e;
      --accent-2: #38bdf8;
      --warning: #f59e0b;
      --off: #475569;
      --danger: #ef4444;
      --border: rgba(255,255,255,0.08);
      --shadow: 0 10px 30px rgba(0,0,0,0.28);
      --radius: 18px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: linear-gradient(180deg, #0b1220, #111827 30%, #0f172a 100%);
      color: var(--text);
    }
    .container { width: min(1180px, calc(100% - 32px)); margin: 24px auto 40px; }
    .hero {
      background: linear-gradient(135deg, rgba(34,197,94,0.18), rgba(56,189,248,0.15));
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 22px;
      box-shadow: var(--shadow);
      margin-bottom: 18px;
    }
    .hero h1 { margin: 0 0 8px; font-size: 1.9rem; }
    .hero p { margin: 0; color: var(--muted); }
    .inline-form { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-top:12px; }
    .input-date { background: rgba(255,255,255,0.06); color: var(--text); border:1px solid var(--border); border-radius:12px; padding:12px 14px; font: inherit; }
    .input-date::-webkit-calendar-picker-indicator { filter: invert(1) brightness(1.2); cursor:pointer; }
    .grid { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 18px; }
    .card {
      background: rgba(17,24,39,0.92);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow);
    }
    .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    .pill {
      display: inline-flex; align-items: center; gap: 8px; padding: 7px 12px; border-radius: 999px;
      font-size: 0.9rem; border: 1px solid var(--border); background: rgba(255,255,255,0.03); color: var(--text);
    }
    .pill.on { background: rgba(34,197,94,0.16); color: #bbf7d0; }
    .pill.off { background: rgba(100,116,139,0.18); color: #cbd5e1; }
    .pill.optional { background: rgba(245,158,11,0.16); color: #fde68a; }
    .muted { color: var(--muted); }
    .exercise-list { display: grid; gap: 10px; margin-top: 14px; }
    .exercise-item {
      display: flex; justify-content: space-between; gap: 12px; padding: 12px 14px; border-radius: 14px;
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
    }
    .exercise-item strong { display: block; }
    .buttons { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; }
    button {
      border: 0; border-radius: 12px; padding: 12px 16px; font-weight: 700; cursor: pointer;
      transition: transform .08s ease, opacity .2s ease;
    }
    button:hover { transform: translateY(-1px); }
    .btn-primary { background: var(--accent); color: #06240f; }
    .btn-secondary { background: var(--panel-2); color: var(--text); border: 1px solid var(--border); }
    .btn-danger { background: rgba(239,68,68,0.18); color: #fecaca; border: 1px solid rgba(239,68,68,0.25); }
    .form-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 12px; margin-top: 14px; }
    .field { display: grid; gap: 6px; }
    .field label { font-size: 0.92rem; color: var(--muted); }
    .field input, .field select, .field textarea {
      width: 100%; padding: 11px 12px; background: #0b1220; color: var(--text);
      border: 1px solid var(--border); border-radius: 12px; outline: none;
    }
    .field textarea { min-height: 84px; resize: vertical; }
    .full { grid-column: 1 / -1; }
    .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-top: 12px; }
    .day-name, .day-cell { text-align: center; padding: 10px 6px; border-radius: 12px; font-size: 0.92rem; }
    .day-name { color: var(--muted); }
    .day-cell {
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); min-height: 72px;
      display: flex; flex-direction: column; justify-content: center; gap: 6px; cursor: pointer;
    }
    .day-cell.empty { background: transparent; border-color: transparent; cursor: default; }
    .day-cell.today { outline: 2px solid rgba(56,189,248,0.7); }
    .day-cell.on { background: rgba(34,197,94,0.10); }
    .day-cell.off { background: rgba(100,116,139,0.14); }
    .day-cell.optional { background: rgba(245,158,11,0.12); }
    .day-cell.done { background: rgba(56,189,248,0.15); }
    .legend { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
    .stats-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 12px; }
    .stat { padding: 14px; background: rgba(255,255,255,0.03); border-radius: 14px; border: 1px solid rgba(255,255,255,0.05); }
    .stat .value { font-size: 1.6rem; font-weight: 800; margin-top: 4px; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.95rem; }
    th, td { padding: 10px 8px; border-bottom: 1px solid rgba(255,255,255,0.07); text-align: left; vertical-align: top; }
    th { color: var(--muted); font-weight: 600; }
    .history-item { padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.07); }
    .history-item:last-child { border-bottom: 0; }
    .mini-nav, .calendar-head { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .calendar-head { justify-content: space-between; }
    @media (max-width: 920px) { .grid, .form-grid, .stats-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div class="container">
  <section class="hero">
    <h1>Programme CAP débutant – Test V0 corrigé</h1>
    <p>Même design que le prototype précédent, mais bien adapté au programme course à pied : lundis, jeudis, et séance week-end optionnelle à faire soit le samedi soit le dimanche.</p>
    <div id="startSettings" style="margin-top:16px;"></div>
  </section>
  <div class="grid">
    <div>
      <section class="card" id="todayCard"></section>
      <section class="card" id="logCard" style="margin-top:18px;"></section>
      <section class="card" id="nextCard" style="margin-top:18px;"></section>
      <section class="card" id="historyCard" style="margin-top:18px;"></section>
    </div>
    <div>
      <section class="card" id="calendarCard"></section>
      <section class="card" id="statsCard" style="margin-top:18px;"></section>
      <section class="card" style="margin-top:18px;">
        <h3>Actions rapides</h3>
        <div class="buttons">
          <button class="btn-secondary" id="resetMonthBtn">Réinitialiser les validations</button>
          <button class="btn-danger" id="resetAllBtn">Tout effacer</button>
        </div>
        <p class="muted" style="margin-top:12px;">Les données sont enregistrées localement dans le navigateur.</p>
      </section>
    </div>
  </div>
</div>
<script>
const STORAGE_KEY = 'programme-cap-debutant-v1-corrige';
const dayNames = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
const monthNames = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
const programWeeks = [
  { week: 1, run: 1, walk: 2, reps: 10, total: 30 },
  { week: 2, run: 2, walk: 2, reps: 8, total: 32 },
  { week: 3, run: 3, walk: 2, reps: 7, total: 35 },
  { week: 4, run: 5, walk: 2, reps: 6, total: 42 },
  { week: 5, run: 7, walk: 2, reps: 5, total: 45 },
  { week: 6, run: 10, walk: 1, reps: 4, total: 44 },
  { week: 7, run: 15, walk: 1, reps: 3, total: 48 },
  { week: 8, run: 30, walk: 0, reps: 1, total: 30 }
];
const sessionMap = {
  0: { code: 'S1', label: 'Séance 1', type: 'on' },
  3: { code: 'S2', label: 'Séance 2', type: 'on' },
  5: { code: 'S3', label: 'Séance 3 optionnelle', type: 'optional' },
  6: { code: 'S3', label: 'Séance 3 optionnelle', type: 'optional' }
};
function formatDateKey(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function parseKey(k){ return new Date(k + 'T12:00:00'); }
function todayKey(){ return formatDateKey(new Date()); }
function addDays(date, n){ const d = new Date(date); d.setDate(d.getDate()+n); return d; }
function getMonday(date){ const d = new Date(date); const day = (d.getDay()+6)%7; d.setDate(d.getDate()-day); d.setHours(12,0,0,0); return d; }
function utcDayNumber(d){ return Math.floor(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()) / 86400000); }
function diffWholeDays(a,b){ return utcDayNumber(a) - utcDayNumber(b); }
function formatDateFR(value){ const d = typeof value === 'string' ? parseKey(value) : value; return new Intl.DateTimeFormat('fr-FR',{weekday:'long', day:'numeric', month:'long', year:'numeric'}).format(d); }
function monthKeyFromDate(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; }
function monthLabel(monthKey){ const [y,m] = monthKey.split('-').map(Number); return `${monthNames[m-1]} ${y}`; }
function shiftMonth(monthKey, delta){ const [y,m] = monthKey.split('-').map(Number); const d = new Date(y, m-1+delta, 1, 12); return monthKeyFromDate(d); }
function getWeekendPartner(key){ const d = parseKey(key); const js = d.getDay(); if(js === 6) return formatDateKey(addDays(d,1)); if(js === 0) return formatDateKey(addDays(d,-1)); return null; }
function initialState(){ const tk = todayKey(); return { startDate: formatDateKey(getMonday(new Date())), viewDate: tk, calendarMonth: tk.slice(0,7), logs:{} }; }
function loadState(){ try { const raw = localStorage.getItem(STORAGE_KEY); return raw ? { ...initialState(), ...JSON.parse(raw), logs: JSON.parse(raw).logs || {} } : initialState(); } catch { return initialState(); } }
function saveState(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function getProgramForDate(dateKey){
  const start = parseKey(state.startDate); const current = parseKey(dateKey);
  const startMonday = getMonday(start); const currentMonday = getMonday(current);
  const diffWeeks = Math.floor(diffWholeDays(currentMonday, startMonday) / 7);
  const weekIndex = Math.max(0, diffWeeks);
  const weekData = programWeeks[Math.min(weekIndex, programWeeks.length-1)];
  const js = current.getDay(); const idx = js === 0 ? 6 : js - 1; const session = sessionMap[idx] || null;
  const isOff = !session; const optional = session?.type === 'optional'; const partner = optional ? getWeekendPartner(dateKey) : null;
  const partnerLog = partner ? state.logs[partner] : null;
  return {
    weekData, weekIndex, isOff, optional,
    sessionCode: session ? session.code : '-',
    sessionLabel: session ? session.label : 'Jour OFF',
    title: `Semaine ${Math.min(weekIndex+1, 8)} / 8 – ${session ? session.label : 'Jour OFF'}`,
    alreadyDoneOnWeekendOtherDay: !!partnerLog,
    blockedByWeekendOtherDay: optional && !!partnerLog,
    exercises: isOff ? [] : [
      { name:'Temps de course', target: weekData.run, unit:'min' },
      { name:'Temps de marche', target: weekData.walk, unit:'min' },
      { name:'Répétitions', target: weekData.reps, unit:'x' },
      { name:'Durée totale estimée', target: weekData.total, unit:'min' }
    ],
    estCalories: Math.round(weekData.total * 8.5)
  };
}
function getLog(key){ return state.logs[key] || null; }
function deleteLog(key){ delete state.logs[key]; saveState(); render(); }
function updateStartDate(dateKey, resetView=true){
  state.startDate = dateKey;
  if(resetView){
    state.viewDate = dateKey;
    state.calendarMonth = dateKey.slice(0,7);
  }
  saveState();
  render();
}
function renderStartSettings(){
  const mondayOfToday = formatDateKey(getMonday(new Date()));
  document.getElementById('startSettings').innerHTML = `
    <div class="row" style="justify-content:space-between;align-items:flex-start;gap:14px;">
      <div>
        <div style="font-weight:700; margin-bottom:6px;">Date de début du programme</div>
        <div class="muted">Définis ici le point de départ de tes 8 semaines. Le planning se recalculera automatiquement.</div>
      </div>
      <span class="pill">Départ actuel : ${formatDateFR(state.startDate)}</span>
    </div>
    <div class="inline-form">
      <input class="input-date" type="date" id="startDateInput" value="${state.startDate}" />
      <button class="btn-primary" id="applyStartDateBtn">Appliquer cette date</button>
      <button class="btn-secondary" id="setMondayBtn">Mettre le lundi actuel</button>
    </div>
    <div class="muted" style="margin-top:10px;">Astuce : si tu veux repartir proprement, change la date puis utilise “Tout effacer”. Lundi actuel recommandé : ${formatDateFR(mondayOfToday)}.</div>
  `;
  document.getElementById('applyStartDateBtn').onclick = ()=>{
    const picked = document.getElementById('startDateInput').value;
    if(!picked) return;
    updateStartDate(picked);
  };
  document.getElementById('setMondayBtn').onclick = ()=> updateStartDate(mondayOfToday);
}
function renderToday(){
  const key = state.viewDate; const program = getProgramForDate(key); const log = getLog(key); const isToday = key === todayKey();
  const statusClass = program.isOff ? 'off' : program.optional ? 'optional' : 'on';
  const statusLabel = program.isOff ? 'Jour OFF' : program.optional ? 'Jour optionnel' : 'Jour ON';
  const blocked = program.blockedByWeekendOtherDay;
  document.getElementById('todayCard').innerHTML = `
    <div class="row" style="justify-content:space-between;align-items:flex-start;">
      <div>
        <h2 style="margin:0 0 6px;">${isToday ? 'Séance du jour' : 'Séance consultée'}</h2>
        <div class="muted">${formatDateFR(key)}</div>
      </div>
      <span class="pill ${statusClass}">${statusLabel}</span>
    </div>
    <div class="mini-nav" style="margin-top:14px;">
      <button class="btn-secondary" id="prevDayBtn">← Jour précédent</button>
      <button class="btn-secondary" id="nextDayBtn">Jour suivant →</button>
      ${isToday ? '' : '<button class="btn-primary" id="backTodayBtn">Revenir à aujourd\'hui</button>'}
    </div>
    <div style="margin-top:12px;" class="pill">${program.title}</div>
    ${program.isOff ? `<p style="margin-top:16px;">Journée sans séance CAP prévue. Tu peux marcher un peu, récupérer, ou consulter les prochaines séances plus bas.</p>` : `
      <div class="exercise-list">
        ${program.exercises.map(ex => `<div class="exercise-item"><div><strong>${ex.name}</strong><span class="muted">Objectif du jour</span></div><div><strong>${ex.target} ${ex.unit}</strong></div></div>`).join('')}
      </div>
      <div style="margin-top:14px;" class="muted">Échauffement conseillé : 5 à 10 min de marche active avant de démarrer.</div>
      <div style="margin-top:8px;" class="muted">Calories estimées de base : ~${program.estCalories} kcal</div>
      ${program.optional ? `<div style="margin-top:8px;" class="muted">La séance week-end peut être validée le samedi ou le dimanche.</div>` : ''}
      ${blocked ? `<div style="margin-top:10px;color:#93c5fd;">La séance week-end a déjà été enregistrée sur l'autre jour.</div>` : ''}
    `}
    <div class="buttons">
      <button class="btn-primary" id="fillTargetsBtn" ${program.isOff || blocked || log ? 'disabled style="opacity:.5;cursor:not-allowed;"' : ''}>Préremplir</button>
      <button class="btn-secondary" id="scrollLogBtn">${log ? 'Voir la séance validée' : 'Valider la séance'}</button>
    </div>
    ${log ? `<p style="margin-top:14px;color:#93c5fd;">Séance déjà enregistrée pour cette date.</p>` : ''}
  `;
  document.getElementById('prevDayBtn').onclick = ()=>{ state.viewDate = formatDateKey(addDays(parseKey(key), -1)); state.calendarMonth = state.viewDate.slice(0,7); saveState(); render(); };
  document.getElementById('nextDayBtn').onclick = ()=>{ state.viewDate = formatDateKey(addDays(parseKey(key), 1)); state.calendarMonth = state.viewDate.slice(0,7); saveState(); render(); };
  const bt = document.getElementById('backTodayBtn'); if(bt) bt.onclick = ()=>{ state.viewDate = todayKey(); state.calendarMonth = todayKey().slice(0,7); saveState(); render(); };
  document.getElementById('scrollLogBtn').onclick = ()=> document.getElementById('logCard').scrollIntoView({behavior:'smooth', block:'start'});
  const fillBtn = document.getElementById('fillTargetsBtn'); if(fillBtn) fillBtn.onclick = ()=>fillTargets(program);
}
function fillTargets(program){
  document.getElementById('runMinutes').value = program.weekData.run;
  document.getElementById('walkMinutes').value = program.weekData.walk;
  document.getElementById('repetitionsDone').value = program.weekData.reps;
  document.getElementById('totalDuration').value = program.weekData.total;
  document.getElementById('caloriesBurned').value = program.estCalories;
}
function renderLogForm(){
  const key = state.viewDate; const program = getProgramForDate(key); const log = getLog(key); const blocked = program.blockedByWeekendOtherDay;
  const card = document.getElementById('logCard');
  if(program.isOff){ card.innerHTML = `<h3>Validation</h3><p class="muted">Aucune séance prévue pour cette date.</p>`; return; }
  if(blocked && !log){ card.innerHTML = `<h3>Validation</h3><p class="muted">La séance optionnelle du week-end a déjà été validée sur l'autre jour. Rien à saisir ici.</p>`; return; }
  if(log){
    card.innerHTML = `
      <h3>Séance enregistrée</h3>
      <table>
        <tr><th>Séance</th><td>${log.sessionCode}</td></tr>
        <tr><th>Temps de course</th><td>${log.runMinutes} min</td></tr>
        <tr><th>Temps de marche</th><td>${log.walkMinutes} min</td></tr>
        <tr><th>Répétitions</th><td>${log.repetitionsDone}</td></tr>
        <tr><th>Durée totale</th><td>${log.totalDuration} min</td></tr>
        <tr><th>Calories</th><td>${log.caloriesBurned} kcal</td></tr>
        <tr><th>Ressenti</th><td>${log.feeling}</td></tr>
        <tr><th>Note</th><td>${log.notes || '—'}</td></tr>
      </table>
      <div class="buttons">
        <button class="btn-secondary" id="editLogBtn">Modifier</button>
        <button class="btn-danger" id="deleteLogBtn">Supprimer</button>
      </div>`;
    document.getElementById('editLogBtn').onclick = ()=> renderEditableLogForm(log);
    document.getElementById('deleteLogBtn').onclick = ()=> deleteLog(key);
    return;
  }
  renderEditableLogForm();
}
function renderEditableLogForm(existing = null){
  const key = state.viewDate; const program = getProgramForDate(key); const card = document.getElementById('logCard');
  card.innerHTML = `
    <h3>${existing ? 'Modifier la séance' : 'Valider la séance'}</h3>
    <div class="form-grid">
      <div class="field"><label>Temps de course (min)</label><input id="runMinutes" type="number" min="0" value="${existing?.runMinutes ?? ''}"></div>
      <div class="field"><label>Temps de marche (min)</label><input id="walkMinutes" type="number" min="0" value="${existing?.walkMinutes ?? ''}"></div>
      <div class="field"><label>Répétitions</label><input id="repetitionsDone" type="number" min="0" value="${existing?.repetitionsDone ?? ''}"></div>
      <div class="field"><label>Durée totale (min)</label><input id="totalDuration" type="number" min="0" value="${existing?.totalDuration ?? ''}"></div>
      <div class="field"><label>Calories brûlées</label><input id="caloriesBurned" type="number" min="0" value="${existing?.caloriesBurned ?? ''}"></div>
      <div class="field"><label>Ressenti</label>
        <select id="feeling">
          <option ${existing?.feeling==='Facile'?'selected':''}>Facile</option>
          <option ${existing?.feeling==='Moyen' || !existing ?'selected':''}>Moyen</option>
          <option ${existing?.feeling==='Dur'?'selected':''}>Dur</option>
        </select>
      </div>
      <div class="field full"><label>Note personnelle</label><textarea id="notes">${existing?.notes || ''}</textarea></div>
    </div>
    <div class="buttons">
      <button class="btn-primary" id="saveLogBtn">${existing ? 'Enregistrer les modifications' : 'Valider la séance'}</button>
      <button class="btn-secondary" id="prefillBtn">Préremplir avec les objectifs</button>
    </div>
    <p class="muted" style="margin-top:12px;">Objectif : ${program.weekData.run} min course / ${program.weekData.walk} min marche / ${program.weekData.reps} répétitions / ${program.weekData.total} min.</p>
  `;
  document.getElementById('saveLogBtn').onclick = ()=>{
    const payload = {
      date: key,
      sessionCode: program.sessionCode,
      sessionLabel: program.sessionLabel,
      runMinutes: Number(document.getElementById('runMinutes').value || 0),
      walkMinutes: Number(document.getElementById('walkMinutes').value || 0),
      repetitionsDone: Number(document.getElementById('repetitionsDone').value || 0),
      totalDuration: Number(document.getElementById('totalDuration').value || 0),
      caloriesBurned: Number(document.getElementById('caloriesBurned').value || 0),
      feeling: document.getElementById('feeling').value,
      notes: document.getElementById('notes').value.trim()
    };
    state.logs[key] = payload; saveState(); render();
  };
  document.getElementById('prefillBtn').onclick = ()=> fillTargets(program);
}
function renderNextSessions(){
  const items = []; let d = parseKey(state.viewDate); let guard = 0;
  while(items.length < 6 && guard < 20){
    d = addDays(d,1); guard += 1; const key = formatDateKey(d); const p = getProgramForDate(key);
    if(!p.isOff){
      const done = !!getLog(key) || p.blockedByWeekendOtherDay;
      items.push({ key, p, done });
    }
  }
  document.getElementById('nextCard').innerHTML = `
    <h3>Séances suivantes</h3>
    ${items.map(item => `
      <div class="history-item">
        <div class="row" style="justify-content:space-between;align-items:flex-start;">
          <div>
            <strong>${formatDateFR(item.key)}</strong>
            <div class="muted">${item.p.sessionLabel}</div>
          </div>
          <span class="pill ${item.done ? 'on' : (item.p.optional ? 'optional' : 'off')}">${item.done ? 'Déjà faite' : (item.p.optional ? 'Optionnelle' : 'À venir')}</span>
        </div>
        <div class="muted" style="margin-top:8px;">${item.p.weekData.run} min course / ${item.p.weekData.walk} min marche / ${item.p.weekData.reps} répétitions / ${item.p.weekData.total} min total</div>
      </div>
    `).join('')}
  `;
}
function renderHistory(){
  const logs = Object.values(state.logs).sort((a,b)=> b.date.localeCompare(a.date));
  document.getElementById('historyCard').innerHTML = `
    <h3>Historique</h3>
    ${logs.length ? logs.map(log => `
      <div class="history-item">
        <div class="row" style="justify-content:space-between;align-items:flex-start;">
          <div>
            <strong>${formatDateFR(log.date)}</strong>
            <div class="muted">${log.sessionCode} • ${log.runMinutes} min course • ${log.walkMinutes} min marche • ${log.caloriesBurned} kcal</div>
          </div>
          <button class="btn-secondary small" data-open="${log.date}">Ouvrir</button>
        </div>
      </div>
    `).join('') : '<p class="muted">Aucune séance validée pour le moment.</p>'}
  `;
  document.querySelectorAll('[data-open]').forEach(btn=> btn.onclick = ()=>{ state.viewDate = btn.dataset.open; state.calendarMonth = state.viewDate.slice(0,7); saveState(); render(); });
}
function renderStats(){
  const logs = Object.values(state.logs); const sessions = logs.length;
  const totalRun = logs.reduce((s,l)=> s + l.runMinutes, 0);
  const totalWalk = logs.reduce((s,l)=> s + l.walkMinutes, 0);
  const totalDuration = logs.reduce((s,l)=> s + l.totalDuration, 0);
  const totalReps = logs.reduce((s,l)=> s + l.repetitionsDone, 0);
  const totalCalories = logs.reduce((s,l)=> s + l.caloriesBurned, 0);
  const avgCalories = sessions ? Math.round(totalCalories / sessions) : 0;
  document.getElementById('statsCard').innerHTML = `
    <h3>Statistiques</h3>
    <div class="stats-grid">
      <div class="stat"><div class="muted">Séances validées</div><div class="value">${sessions}</div></div>
      <div class="stat"><div class="muted">Calories totales</div><div class="value">${totalCalories}</div></div>
      <div class="stat"><div class="muted">Moyenne kcal / séance</div><div class="value">${avgCalories}</div></div>
      <div class="stat"><div class="muted">Temps de course cumulé</div><div class="value">${totalRun} min</div></div>
      <div class="stat"><div class="muted">Temps de marche cumulé</div><div class="value">${totalWalk} min</div></div>
      <div class="stat"><div class="muted">Durée totale cumulée</div><div class="value">${totalDuration} min</div></div>
      <div class="stat"><div class="muted">Répétitions cumulées</div><div class="value">${totalReps}</div></div>
    </div>
  `;
}
function renderCalendar(){
  const monthKey = state.calendarMonth; const [y,m] = monthKey.split('-').map(Number); const first = new Date(y, m-1, 1, 12); const last = new Date(y, m, 0, 12);
  const startIndex = (first.getDay()+6)%7; const totalDays = last.getDate();
  let cells = '';
  for(let i=0;i<startIndex;i++) cells += '<div class="day-cell empty"></div>';
  for(let day=1; day<=totalDays; day++){
    const key = `${y}-${String(m).padStart(2,'0')}-${String(day).padStart(2,'0')}`; const p = getProgramForDate(key); const log = getLog(key);
    const cls = ['day-cell']; if(key === todayKey()) cls.push('today'); if(log) cls.push('done'); else cls.push(p.isOff ? 'off' : (p.optional ? 'optional' : 'on'));
    const label = log ? 'OK' : p.isOff ? 'OFF' : p.optional ? 'OPT' : p.sessionCode;
    cells += `<div class="${cls.join(' ')}" data-date="${key}"><strong>${day}</strong><span>${label}</span></div>`;
  }
  document.getElementById('calendarCard').innerHTML = `
    <div class="calendar-head">
      <button class="btn-secondary" id="prevMonthBtn">←</button>
      <div style="font-weight:700; font-size:1.1rem;">${monthLabel(monthKey)}</div>
      <button class="btn-secondary" id="nextMonthBtn">→</button>
    </div>
    <p class="muted" style="margin-top:8px;">Clique sur un jour pour consulter la séance.</p>
    <div class="calendar">${dayNames.map(n=>`<div class="day-name">${n}</div>`).join('')}${cells}</div>
    <div class="legend">
      <span class="pill on">Jour ON</span>
      <span class="pill optional">Optionnel</span>
      <span class="pill off">Jour OFF</span>
      <span class="pill" style="background:rgba(56,189,248,0.15);color:#bae6fd;">Séance validée</span>
    </div>
  `;
  document.getElementById('prevMonthBtn').onclick = ()=>{ state.calendarMonth = shiftMonth(state.calendarMonth,-1); saveState(); render(); };
  document.getElementById('nextMonthBtn').onclick = ()=>{ state.calendarMonth = shiftMonth(state.calendarMonth,1); saveState(); render(); };
  document.querySelectorAll('[data-date]').forEach(cell=> cell.onclick = ()=>{ state.viewDate = cell.dataset.date; state.calendarMonth = state.viewDate.slice(0,7); saveState(); render(); });
}
function render(){ renderStartSettings(); renderToday(); renderLogForm(); renderNextSessions(); renderHistory(); renderStats(); renderCalendar(); }
let state = loadState();
document.getElementById('resetMonthBtn').onclick = ()=>{ state.logs = {}; saveState(); render(); };
document.getElementById('resetAllBtn').onclick = ()=>{ localStorage.removeItem(STORAGE_KEY); state = initialState(); saveState(); render(); };
render();
</script>
</body>
</html>
