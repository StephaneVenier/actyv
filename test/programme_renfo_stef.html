<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Routine muscu prépa Stef V0</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #1f2937;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #22c55e;
      --accent-2: #38bdf8;
      --warning: #f59e0b;
      --off: #475569;
      --danger: #ef4444;
      --border: rgba(255,255,255,0.08);
      --shadow: 0 10px 30px rgba(0,0,0,0.28);
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: linear-gradient(180deg, #0b1220, #111827 30%, #0f172a 100%);
      color: var(--text);
    }
    .container {
      width: min(1180px, calc(100% - 32px));
      margin: 24px auto 40px;
    }
    .hero {
      background: linear-gradient(135deg, rgba(34,197,94,0.18), rgba(56,189,248,0.15));
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 22px;
      box-shadow: var(--shadow);
      margin-bottom: 18px;
    }
    .hero h1 { margin: 0 0 8px; font-size: 1.9rem; }
    .hero p { margin: 0; color: var(--muted); }

    .hero-brand {
      display: flex;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
    }
    .hero-brand img {
      height: 68px;
      width: auto;
      display: block;
      object-fit: contain;
    }
    .hero-copy {
      flex: 1;
      min-width: 240px;
    }
    .hero-copy h1 { margin: 0 0 8px; font-size: 1.9rem; }
    .hero-copy p { margin: 0; color: var(--muted); }
    .start-card {
      margin-bottom: 18px;
    }
    .inline-form {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: end;
      margin-top: 14px;
    }
    .inline-form .field {
      min-width: 220px;
      flex: 1;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 18px;
    }
    .card {
      background: rgba(17,24,39,0.92);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow);
    }
    .card h2, .card h3 { margin-top: 0; }
    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 0.9rem;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
      color: var(--text);
    }
    .pill.on { background: rgba(34,197,94,0.16); color: #bbf7d0; }
    .pill.off { background: rgba(100,116,139,0.18); color: #cbd5e1; }
    .muted { color: var(--muted); }
    .exercise-list {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }
    .exercise-item {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
    }
    .exercise-item strong { display: block; }
    .buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }
    button {
      border: 0;
      border-radius: 12px;
      padding: 12px 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform .08s ease, opacity .2s ease;
    }
    button:hover { transform: translateY(-1px); }
    .btn-primary { background: var(--accent); color: #06240f; }
    .btn-secondary { background: var(--panel-2); color: var(--text); border: 1px solid var(--border); }
    .btn-danger { background: rgba(239,68,68,0.18); color: #fecaca; border: 1px solid rgba(239,68,68,0.25); }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 14px;
    }
    .field {
      display: grid;
      gap: 6px;
    }
    .field label { font-size: 0.92rem; color: var(--muted); }
    .field input, .field select, .field textarea {
      width: 100%;
      padding: 11px 12px;
      background: #0b1220;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 12px;
      outline: none;
    }
    .field textarea { min-height: 84px; resize: vertical; }
    .full { grid-column: 1 / -1; }

    .calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      margin-top: 12px;
    }
    .day-name, .day-cell {
      text-align: center;
      padding: 10px 6px;
      border-radius: 12px;
      font-size: 0.92rem;
    }
    .day-name { color: var(--muted); }
    .day-cell {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
      min-height: 72px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 6px;
      cursor: pointer;
    }
    .day-cell.empty { background: transparent; border-color: transparent; }
    .day-cell.today { outline: 2px solid rgba(56,189,248,0.7); }
    .day-cell.on { background: rgba(34,197,94,0.10); }
    .day-cell.off { background: rgba(100,116,139,0.14); }
    .day-cell.done { background: rgba(56,189,248,0.15); }
    .legend { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    .stat {
      padding: 14px;
      background: rgba(255,255,255,0.03);
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .stat .value { font-size: 1.6rem; font-weight: 800; margin-top: 4px; }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      font-size: 0.95rem;
    }
    th, td {
      padding: 10px 8px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      text-align: left;
      vertical-align: top;
    }
    th { color: var(--muted); font-weight: 600; }

    .history-item {
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    function todayStr() {
      const d = new Date();
      return formatDateKey(d);

    function formatDateKey(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function formatDateFR(dateOrKey) {
      const d = typeof dateOrKey === 'string' ? new Date(dateOrKey + 'T12:00:00') : dateOrKey;
      return new Intl.DateTimeFormat('fr-FR', {
        weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
      }).format(d);
    }

    function getMonday(date) {
      const d = new Date(date);
      const day = (d.getDay() + 6) % 7;
      d.setDate(d.getDate() - day);
      d.setHours(12,0,0,0);
      return d;
    }

    function addDays(date, days) {
      const d = new Date(date);
      d.setDate(d.getDate() + days);
      return d;
    }

    function monthLabel(monthKey) {
      const [year, month] = monthKey.split('-').map(Number);
      return new Intl.DateTimeFormat('fr-FR', { month: 'long', year: 'numeric' }).format(new Date(year, month - 1, 1, 12));
    }

    function shiftMonth(monthKey, delta) {
      const [year, month] = monthKey.split('-').map(Number);
      const d = new Date(year, month - 1 + delta, 1, 12);
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
    }

    function initialState() {
      return {
        startDate: formatDateKey(getMonday(new Date())),
        viewDate: todayStr(),
        calendarMonth: todayStr().slice(0, 7),
        logs: {}
      };
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        const parsed = raw ? JSON.parse(raw) : initialState();
        return {
          ...initialState(),
          ...parsed,
          logs: parsed.logs || {}
        };
      } catch {
        return initialState();
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function getProgramForDate(dateKey) {
      const start = new Date(state.startDate + 'T12:00:00');
      const current = new Date(dateKey + 'T12:00:00');
      const diffDays = Math.round((current - start) / 86400000);
      const weekIndex = Math.max(0, Math.floor(diffDays / 7));
      const cycleWeek = weekIndex % programWeeks.length;
      const safeWeek = programWeeks[cycleWeek];
      const jsDay = current.getDay();
      const dayIndex = jsDay === 0 ? 6 : jsDay - 1;
      const isOff = !safeWeek.onDays.includes(dayIndex);
      return {
        weekIndex: Math.max(0, weekIndex),
        cycleWeek,
        ...safeWeek,
        isOff,
      };
    }

    function getLog(dateKey) {
      return state.logs[dateKey] || null;
    }

    function setLog(dateKey, payload) {
      state.logs[dateKey] = payload;
      saveState();
      render();
    }

    function deleteAll() {
      localStorage.removeItem(STORAGE_KEY);
      state = initialState();
      saveState();
      render();
    }

    function resetLogs() {
      state.logs = {};
      saveState();
      render();
    }


    function renderStartDateControls() {
      const card = document.getElementById('startDateCard');
      const mondayLabel = formatDateFR(getMonday(new Date()));
      card.innerHTML = `
        <h3>Date de départ</h3>
        <div class="muted">Choisis le lundi de départ du programme. Le cycle 8 semaines se recale automatiquement.</div>
        <div class="inline-form">
          <div class="field">
            <label>Date de départ</label>
            <input type="date" id="startDateInput" value="${state.startDate}" />
          </div>
          <button class="btn-primary" id="applyStartDateBtn">Appliquer cette date</button>
          <button class="btn-secondary" id="currentMondayBtn">Mettre le lundi actuel</button>
        </div>
        <div class="muted" style="margin-top:10px;">Départ actuel : ${formatDateFR(state.startDate)} • Lundi actuel : ${mondayLabel}</div>
      `;

      document.getElementById('applyStartDateBtn').onclick = () => {
        const value = document.getElementById('startDateInput').value;
        if (!value) return;
        state.startDate = value;
        state.viewDate = value;
        state.calendarMonth = value.slice(0, 7);
        saveState();
        render();
      };

      document.getElementById('currentMondayBtn').onclick = () => {
        const monday = formatDateKey(getMonday(new Date()));
        state.startDate = monday;
        state.viewDate = monday;
        state.calendarMonth = monday.slice(0, 7);
        saveState();
        render();
      };
    }

    function renderToday() {
      const key = state.viewDate || todayStr();
      const program = getProgramForDate(key);
      const log = getLog(key);
      const card = document.getElementById('todayCard');
      const isToday = key === todayStr();
      card.innerHTML = `
        <div class="row" style="justify-content:space-between; align-items:flex-start;">
          <div>
            <h2 style="margin-bottom:6px;">${isToday ? 'Routine du jour' : 'Routine consultée'}</h2>
            <div class="muted">${formatDateFR(key)}</div>
          </div>
          <span class="pill ${program.isOff ? 'off' : 'on'}">${program.isOff ? 'Jour OFF' : 'Jour ON'}</span>
        </div>
        <div class="mini-nav">
          <button class="btn-secondary" id="prevDayBtn">← Jour précédent</button>
          <button class="btn-secondary" id="nextDayBtn">Jour suivant →</button>
          ${isToday ? '' : '<button class="btn-primary" id="backTodayBtn">Revenir à aujourd\'hui</button>'}
        </div>
        <div class="row" style="margin-top:12px;">
          <div class="pill">${program.title}</div>
          <div class="pill">Semaine ${program.cycleWeek + 1} / ${programWeeks.length}</div>
        </div>
        ${program.isOff ? `
          <p style="margin-top:16px;">Aujourd'hui : récupération, mobilité, marche légère ou repos complet.</p>
        ` : `
          <div class="exercise-list">
            ${program.exercises.map(ex => `
              <div class="exercise-item">
                <div>
                  <strong>${ex.name}</strong>
                  <span class="muted">Objectif du jour</span>
                </div>
                <div><strong>${ex.target} ${ex.unit}</strong></div>
              </div>`).join('')}
          </div>
          <div style="margin-top:14px;" class="muted">Calories estimées de base : ~${program.estCalories} kcal</div>
        `}
        <div class="buttons">
          <button class="btn-primary" ${log ? 'disabled style="opacity:.5;cursor:not-allowed;"' : ''} id="fillTargetsBtn">Préremplir</button>
          <button class="btn-secondary" id="toggleFormBtn">${log ? 'Voir la séance validée' : 'Valider la séance'}</button>
        </div>
        ${log ? `<p style="margin-top:14px;color:#93c5fd;">Séance déjà enregistrée pour cette date.</p>` : ''}
      `;

      document.getElementById('toggleFormBtn').onclick = () => {
        document.getElementById('logCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
      };
      const fillBtn = document.getElementById('fillTargetsBtn');
      if (fillBtn) fillBtn.onclick = () => fillTargets(program);

      document.getElementById('prevDayBtn').onclick = () => {
        state.viewDate = formatDateKey(addDays(new Date(key + 'T12:00:00'), -1));
        state.calendarMonth = state.viewDate.slice(0, 7);
        saveState();
        render();
      };
      document.getElementById('nextDayBtn').onclick = () => {
        state.viewDate = formatDateKey(addDays(new Date(key + 'T12:00:00'), 1));
        state.calendarMonth = state.viewDate.slice(0, 7);
        saveState();
        render();
      };
      const backBtn = document.getElementById('backTodayBtn');
      if (backBtn) backBtn.onclick = () => {
        state.viewDate = todayStr();
        state.calendarMonth = state.viewDate.slice(0, 7);
        saveState();
        render();
      };
    }

    function renderLogForm() {
      const key = state.viewDate || todayStr();
      const program = getProgramForDate(key);
      const log = getLog(key);
      const card = document.getElementById('logCard');

      if (log) {
        card.innerHTML = `
          <h2>Séance validée</h2>
          <div class="muted">${formatDateFR(key)}</div>
          <div class="exercise-list" style="margin-top:16px;">
            ${log.performed.map(ex => `
              <div class="exercise-item">
                <div><strong>${ex.name}</strong></div>
                <div><strong>${ex.done} ${ex.unit}</strong></div>
              </div>
            `).join('')}
          </div>
          <div class="form-grid">
            <div class="stat"><div class="muted">Calories</div><div class="value">${log.calories}</div></div>
            <div class="stat"><div class="muted">Ressenti</div><div class="value" style="font-size:1.2rem;">${log.feeling || '-'}</div></div>
            <div class="field full"><label>Note</label><div class="pill" style="justify-content:flex-start; border-radius:14px; padding:12px 14px; min-height:50px;">${log.notes || 'Aucune note'}</div></div>
          </div>
        `;
        return;
      }

      card.innerHTML = `
        <h2>Validation de la séance</h2>
        <p class="muted">Renseigne ce que tu as réellement fait. Tu peux modifier les quantités prévues.</p>
        <form id="logForm" class="form-grid">
          ${program.isOff ? `
            <div class="field full">
              <label>Jour OFF</label>
              <div class="pill" style="justify-content:flex-start; padding:12px 14px; border-radius:14px;">Repos, mobilité ou marche légère.</div>
            </div>
          ` : program.exercises.map((ex, idx) => `
            <div class="field">
              <label>${ex.name} (${ex.unit})</label>
              <input type="number" min="0" step="1" name="exercise_${idx}" placeholder="${ex.target}" />
            </div>
          `).join('')}
          <div class="field">
            <label>Calories dépensées</label>
            <input type="number" min="0" step="1" name="calories" placeholder="${program.estCalories}" />
          </div>
          <div class="field">
            <label>Ressenti</label>
            <select name="feeling">
              <option value="">Choisir</option>
              <option>Facile</option>
              <option>Moyen</option>
              <option>Dur</option>
            </select>
          </div>
          <div class="field full">
            <label>Note</label>
            <textarea name="notes" placeholder="Ex : jambes lourdes, séance facile, version light..."></textarea>
          </div>
          <div class="field full">
            <button type="submit" class="btn-primary">Enregistrer la séance</button>
          </div>
        </form>
      `;

      document.getElementById('logForm').onsubmit = (e) => {
        e.preventDefault();
        const form = new FormData(e.target);
        const performed = program.isOff ? [] : program.exercises.map((ex, idx) => ({
          name: ex.name,
          done: Number(form.get(`exercise_${idx}`) || ex.target),
          unit: ex.unit,
        }));
        const payload = {
          date: key,
          isOff: program.isOff,
          performed,
          calories: Number(form.get('calories') || program.estCalories || 0),
          feeling: form.get('feeling') || '',
          notes: form.get('notes') || '',
          createdAt: new Date().toISOString(),
        };
        setLog(key, payload);
      };
    }

    function fillTargets(program) {
      const form = document.getElementById('logForm');
      if (!form || program.isOff) return;
      program.exercises.forEach((ex, idx) => {
        const input = form.querySelector(`[name="exercise_${idx}"]`);
        if (input) input.value = ex.target;
      });
      const calories = form.querySelector('[name="calories"]');
      if (calories) calories.value = program.estCalories;
    }

    function renderCalendar() {
      const monthKey = state.calendarMonth || todayStr().slice(0, 7);
      const [year, month] = monthKey.split('-').map(Number);
      const first = new Date(year, month - 1, 1, 12);
      const last = new Date(year, month, 0, 12);
      const startOffset = (first.getDay() + 6) % 7;
      const card = document.getElementById('calendarCard');

      let html = `
        <div class="calendar-head">
          <div>
            <h3 style="margin-bottom:6px;">Calendrier</h3>
            <div class="muted">Clique sur un jour pour consulter la séance.</div>
          </div>
          <div class="row">
            <button class="btn-secondary" id="prevMonthBtn">←</button>
            <div class="title">${monthLabel(monthKey)}</div>
            <button class="btn-secondary" id="nextMonthBtn">→</button>
          </div>
        </div>`;
      html += `<div class="calendar">${dayNames.map(d => `<div class="day-name">${d}</div>`).join('')}`;

      for (let i = 0; i < startOffset; i++) html += `<div class="day-cell empty"></div>`;

      for (let day = 1; day <= last.getDate(); day++) {
        const d = new Date(year, month - 1, day, 12);
        const key = formatDateKey(d);
        const program = getProgramForDate(key);
        const log = getLog(key);
        const classes = ['day-cell'];
        if (program.isOff) classes.push('off'); else classes.push('on');
        if (log) classes.push('done');
        if (key === todayStr()) classes.push('today');
        const selected = key === state.viewDate;
        html += `
          <div class="${classes.join(' ')}" data-date="${key}" style="${selected ? 'outline:2px solid rgba(255,255,255,0.45);' : ''}">
            <strong>${day}</strong>
            <span style="font-size:.78rem; color:${log ? '#93c5fd' : (program.isOff ? '#cbd5e1' : '#bbf7d0')};">
              ${log ? 'Validé' : (program.isOff ? 'OFF' : 'ON')}
            </span>
          </div>`;
      }
      html += `</div>
        <div class="legend">
          <span class="pill on">Jour ON</span>
          <span class="pill off">Jour OFF</span>
          <span class="pill" style="background:rgba(56,189,248,0.16); color:#bae6fd;">Séance validée</span>
        </div>`;

      card.innerHTML = html;

      document.getElementById('prevMonthBtn').onclick = () => {
        state.calendarMonth = shiftMonth(monthKey, -1);
        saveState();
        renderCalendar();
      };
      document.getElementById('nextMonthBtn').onclick = () => {
        state.calendarMonth = shiftMonth(monthKey, 1);
        saveState();
        renderCalendar();
      };
      card.querySelectorAll('[data-date]').forEach(el => {
        el.onclick = () => {
          state.viewDate = el.dataset.date;
          state.calendarMonth = state.viewDate.slice(0, 7);
          saveState();
          render();
        };
      });
    }

    function computeStats() {
      const logs = Object.values(state.logs);
      const completed = logs.length;
      const totalCalories = logs.reduce((sum, log) => sum + (Number(log.calories) || 0), 0);
      const avgCalories = completed ? Math.round(totalCalories / completed) : 0;
      const totals = {};
      logs.forEach(log => {
        (log.performed || []).forEach(ex => {
          totals[ex.name] = (totals[ex.name] || 0) + (Number(ex.done) || 0);
        });
      });
      return { completed, totalCalories, avgCalories, totals };
    }

    function renderStats() {
      const stats = computeStats();
      const entries = Object.entries(stats.totals).sort((a,b) => b[1]-a[1]);
      const card = document.getElementById('statsCard');
      card.innerHTML = `
        <h3>Statistiques</h3>
        <div class="stats-grid">
          <div class="stat"><div class="muted">Séances validées</div><div class="value">${stats.completed}</div></div>
          <div class="stat"><div class="muted">Calories totales</div><div class="value">${stats.totalCalories}</div></div>
          <div class="stat"><div class="muted">Moyenne / séance</div><div class="value">${stats.avgCalories}</div></div>
          <div class="stat"><div class="muted">Départ du programme</div><div class="value" style="font-size:1rem;">${formatDateFR(state.startDate)}</div></div>
        </div>
        <h3 style="margin-top:18px;">Cumul par exercice</h3>
        ${entries.length ? `
          <table>
            <thead><tr><th>Exercice</th><th>Total</th></tr></thead>
            <tbody>
              ${entries.map(([name, total]) => `<tr><td>${name}</td><td><strong>${total}</strong></td></tr>`).join('')}
            </tbody>
          </table>
        ` : `<p class="muted">Aucune séance enregistrée pour le moment.</p>`}
      `;
    }

    function renderHistory() {
      const logs = Object.values(state.logs).sort((a,b) => new Date(b.date) - new Date(a.date));
      const card = document.getElementById('historyCard');
      card.innerHTML = `
        <h2>Historique</h2>
        ${logs.length ? logs.slice(0, 20).map(log => `
          <div class="history-item">
            <div class="row" style="justify-content:space-between;align-items:flex-start;">
              <div>
                <strong>${formatDateFR(log.date)}</strong>
                <div class="muted">${log.isOff ? 'Jour OFF validé' : 'Séance effectuée'} • ${log.calories || 0} kcal</div>
              </div>
              <div class="row">
                ${log.feeling ? `<span class="pill">${log.feeling}</span>` : ''}
                <button class="btn-secondary move-log-btn" data-date="${log.date}">Déplacer</button>
              </div>
            </div>
            ${log.performed && log.performed.length ? `
              <div class="muted" style="margin-top:8px;">${log.performed.map(ex => `${ex.name}: ${ex.done} ${ex.unit}`).join(' • ')}</div>
            ` : '<div class="muted" style="margin-top:8px;">Repos / mobilité / récupération</div>'}
          </div>
        `).join('') : '<p class="muted">Aucune séance enregistrée.</p>'}
      `;

      card.querySelectorAll('.move-log-btn').forEach(btn => {
        btn.onclick = () => {
          const oldDate = btn.dataset.date;
          const nextDate = prompt('Nouvelle date de la séance (format AAAA-MM-JJ)', oldDate);
          if (!nextDate || !/^\d{4}-\d{2}-\d{2}$/.test(nextDate) || nextDate === oldDate) return;
          const existing = getLog(nextDate);
          if (existing && !confirm('Une séance existe déjà à cette date. L\'écraser ?')) return;
          const movedLog = { ...state.logs[oldDate], date: nextDate };
          delete state.logs[oldDate];
          state.logs[nextDate] = movedLog;
          state.viewDate = nextDate;
          state.calendarMonth = nextDate.slice(0, 7);
          saveState();
          render();
        };
      });
    }

    function render() {
      renderStartDateControls();
      renderToday();
      renderLogForm();
      renderCalendar();
      renderStats();
      renderHistory();
    }

    let state = loadState();
    saveState();
    render();

    document.getElementById('resetAllBtn').onclick = () => {
      if (confirm('Tout effacer ? Programme + historique + stats.')) deleteAll();
    };
    document.getElementById('resetMonthBtn').onclick = () => {
      if (confirm('Effacer uniquement les validations enregistrées ?')) resetLogs();
    };
  </script>
</body>
</html>
